<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>会議システム</title>
  <link rel="stylesheet" href="style.css">

  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <!-- Firebase（config.js で enabled:true の場合のみ有効） -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>

  <!-- Google Identity Services: onload で確実に初期化 -->
  <script src="https://accounts.google.com/gsi/client"
          onload="onGISReady()" async defer></script>
</head>
<body>

<!-- ── ログイン画面 ────────────────────────────────────── -->
<div id="login-screen">
  <div style="font-size:48px">📋</div>
  <h1 id="app-title-login">会議システム</h1>
  <p>Google ドライブの資料を<br>会議室でペーパーレス表示します</p>
  <button class="btn primary" id="btn-signin" style="padding:12px 28px;font-size:15px;">
    Googleでサインイン
  </button>
  <p style="font-size:11px;margin-top:8px;">
    ※ 初回はGoogleアカウントへのアクセスを許可してください
  </p>
</div>

<!-- ── ヘッダー ─────────────────────────────────────────── -->
<header id="header">
  <span id="app-title">会議システム</span>
  <span id="current-file-name"></span>

  <!-- ページ操作 -->
  <button class="btn icon-only" id="btn-prev" title="前のページ" disabled>◀</button>
  <span   id="page-indicator"></span>
  <button class="btn icon-only" id="btn-next" title="次のページ" disabled>▶</button>

  <div class="ctrl-sep" style="display:inline-block"></div>

  <!-- プレゼンター同期 -->
  <button class="btn" id="btn-presenter" title="プレゼンターになる">🎤 発表者</button>
  <button class="btn" id="btn-viewer"    title="ビューワーとして接続">👁 視聴</button>
  <button class="btn" id="btn-projector" title="プロジェクタ出力">📽 出力</button>
</header>

<!-- バッジ -->
<div class="badge" id="badge-presenter">● 発表者</div>
<div class="badge" id="badge-viewer">● 視聴中</div>
<div class="badge" id="badge-projector">● 出力中</div>

<!-- ── メインレイアウト ─────────────────────────────────── -->
<div id="layout" style="display:none">

  <!-- 左：ファイルツリー（縦スクロール） -->
  <aside id="sidebar">
    <div id="sidebar-header">
      <span class="label">資料一覧</span>
      <button class="btn icon-only" id="btn-refresh" title="更新"
        onclick="loadTree(CONFIG.rootFolderId, document.getElementById('file-tree'), 0)">↺</button>
    </div>
    <div id="file-tree"></div>
  </aside>

  <!-- サイドバー開閉タブ -->
  <div id="sidebar-tab">◀</div>

  <!-- 右：ビューアエリア -->
  <main id="main">

    <!-- コントロールバー -->
    <div id="viewer-controls">
      <!-- ズーム -->
      <button class="btn icon-only" id="btn-zoom-out" title="縮小">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      </button>
      <button class="btn icon-only" id="btn-zoom-in"  title="拡大">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      </button>
      <button class="btn icon-only" id="btn-fit" title="幅に合わせる">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/></svg>
      </button>

      <div class="ctrl-sep"></div>

      <!-- サムネイル・アノテーション一覧 -->
      <button class="btn icon-only" id="btn-thumbs" title="サムネイル一覧">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      </button>
      <button class="btn icon-only" id="btn-ann-list" title="アノテーション一覧">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1" fill="currentColor"/><circle cx="3" cy="12" r="1" fill="currentColor"/><circle cx="3" cy="18" r="1" fill="currentColor"/></svg>
      </button>

      <div class="ctrl-sep"></div>

      <!-- ── アノテーションツール（PDFのみ表示） ── -->
      <div id="ann-toolbar" style="display:none; align-items:center; gap:4px;">

        <!-- ペン -->
        <button class="ann-tool-btn" id="btn-draw" title="ペン">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>
          </svg>
          <span>ペン</span>
        </button>

        <!-- マーカー -->
        <button class="ann-tool-btn" id="btn-marker" title="マーカー">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 21v-4l11-11 4 4L7 21H3z"/>
            <path d="M14 6l4 4"/>
          </svg>
          <span>マーカー</span>
        </button>

        <!-- 消しゴム -->
        <button class="ann-tool-btn" id="btn-eraser" title="消しゴム">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 20H7L3 16l10-10 7 7-2.5 2.5"/>
            <path d="M6.5 17.5l4-4"/>
          </svg>
          <span>消しゴム</span>
        </button>

        <!-- 付箋 -->
        <button class="ann-tool-btn" id="btn-sticky" title="付箋">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15.5 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V8.5L15.5 3z"/>
            <path d="M15 3v6h6"/>
            <line x1="8" y1="13" x2="16" y2="13"/>
            <line x1="8" y1="17" x2="13" y2="17"/>
          </svg>
          <span>付箋</span>
        </button>

        <div class="ctrl-sep"></div>

        <!-- カラーパレット -->
        <div class="color-dot" id="btn-color-red"    data-color="#e53935" title="赤"  style="background:#e53935;"></div>
        <div class="color-dot" id="btn-color-blue"   data-color="#1e88e5" title="青"  style="background:#1e88e5;"></div>
        <div class="color-dot" id="btn-color-green"  data-color="#43a047" title="緑"  style="background:#43a047;"></div>
        <div class="color-dot" id="btn-color-yellow" data-color="#fdd835" title="黄"  style="background:#fdd835;"></div>
        <div class="color-dot" id="btn-color-black"  data-color="#212121" title="黒"  style="background:#212121; border:1px solid #555;"></div>

        <div class="ctrl-sep"></div>

        <!-- 太さ -->
        <button class="ann-tool-btn size-fab" id="btn-size-s" data-size="2"  title="細線">
          <div style="width:3px;height:3px;border-radius:50%;background:currentColor;"></div>
        </button>
        <button class="ann-tool-btn size-fab" id="btn-size-m" data-size="5"  title="中線">
          <div style="width:7px;height:7px;border-radius:50%;background:currentColor;"></div>
        </button>
        <button class="ann-tool-btn size-fab" id="btn-size-l" data-size="12" title="太線">
          <div style="width:13px;height:13px;border-radius:50%;background:currentColor;"></div>
        </button>

        <div class="ctrl-sep"></div>

        <!-- 消去 -->
        <button class="ann-tool-btn" id="btn-clear-page" title="このページの描画を消去" style="color:#f85149;">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/>
            <path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
          </svg>
          <span>消去</span>
        </button>

      </div><!-- /ann-toolbar -->
    </div><!-- /viewer-controls -->

    <!-- ビューア本体 -->
    <div id="viewer-wrap">

      <!-- PDFビューア（右方向に横スクロール） -->
      <div id="pdf-scroll">
        <!-- PDFとアノテーションキャンバスをラッパーで重ねる -->
        <div id="canvas-wrap">
          <canvas id="pdf-canvas"></canvas>
          <canvas id="ann-canvas"></canvas>
        </div>
      </div>

      <!-- iframeビューア（Office・動画） -->
      <iframe id="iframe-viewer" allowfullscreen></iframe>

      <!-- ポインターレイヤー -->
      <div id="pointer-layer">
        <div id="pointer-dot"></div>
      </div>


      <!-- サムネイルパネル（下から） -->
      <div id="thumb-panel"></div>

      <!-- アノテーション一覧オーバーレイ -->
      <div id="ann-list">
        <div id="ann-list-header">
          <h3>アノテーション一覧</h3>
          <button class="btn" id="ann-list-close">閉じる</button>
        </div>
        <div id="ann-list-body"></div>
      </div>

      <!-- 空状態 -->
      <div id="empty-state">
        <div class="big">📂</div>
        <div>左のリストからファイルを選んでください</div>
      </div>

      <!-- ローディング -->
      <div id="loading">
        <div class="spinner"></div>
        <span>読み込み中…</span>
      </div>
    </div>
  </main>
</div>

<!-- ── セッションダイアログ ───────────────────────────── -->
<div id="session-dialog">
  <div id="session-inner">
    <h3>同期セッション</h3>
    <p>同じ部屋コードを入力した端末と<br>ファイル・ページ・ポインターが同期されます</p>
    <input id="session-input" type="text" maxlength="12"
           placeholder="例: ROOM-A" autocomplete="off" autocapitalize="characters">
    <div class="row">
      <button class="btn success" id="btn-session-pres">🎤 発表者として参加</button>
      <button class="btn"         id="btn-session-view">👁 視聴者として参加</button>
    </div>
    <button class="btn" id="btn-session-cancel" style="justify-content:center">キャンセル</button>
  </div>
</div>

<!-- トースト -->
<div id="toast"></div>

<!-- 設定 & アプリ本体 -->
<script src="config.js"></script>
<script src="app.js"></script>

<script>
  // GIS ライブラリの onload コールバック
  // async defer で読み込まれるため、app.js より後に呼ばれる場合も
  // app.js より前に呼ばれる場合も両方対応する
  function onGISReady() {
    if (typeof appReady !== 'undefined' && appReady) {
      initAuth();
    } else {
      window._gisReady = true;
    }
  }
</script>

</body>
</html>
