<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>会議システム</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
</head>
<body>

<!-- ── ログイン画面 ── -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-icon">📋</div>
    <h1 id="login-title">会議システム</h1>

    <div class="form-group">
      <label>ユーザーID</label>
      <input type="text" id="login-id" placeholder="ID を入力" autocomplete="username"
             autocapitalize="none" autocorrect="off" spellcheck="false">
    </div>
    <div class="form-group">
      <label>パスワード</label>
      <input type="password" id="login-pass" placeholder="パスワードを入力" autocomplete="current-password">
    </div>
    <div id="login-error"></div>
    <button class="btn primary login-btn" id="btn-login">ログイン</button>
    <a href="admin.html" class="admin-link">⚙ 管理画面</a>
  </div>
</div>

<!-- ── ヘッダー ── -->
<header id="header" style="display:none">
  <span id="app-title-bar">会議システム</span>
  <span id="current-file-name"></span>
  <div class="ctrl-sep" style="display:inline-block; margin-left:auto;"></div>
  <button class="btn" id="btn-presenter" title="発表者モード">🎤 発表者</button>
  <button class="btn" id="btn-viewer"    title="視聴者モード">👁 視聴</button>
  <button class="btn" id="btn-projector" title="プロジェクタ出力">📽 出力</button>
  <button class="btn" id="btn-logout"    title="ログアウト">⏏ 退出</button>
</header>

<div class="badge" id="badge-presenter">● 発表者</div>
<div class="badge" id="badge-viewer">● 視聴中</div>
<div class="badge" id="badge-projector">● 出力中</div>

<!-- ── メインレイアウト ── -->
<div id="layout" style="display:none">

  <!-- 左：ファイルツリー（縦スクロール） -->
  <aside id="sidebar">
    <div id="sidebar-header">
      <span class="label">資料一覧</span>
      <button class="btn icon-only" title="更新" id="btn-refresh">↺</button>
    </div>
    <div id="file-tree"></div>
  </aside>

  <div id="sidebar-tab">◀</div>

  <!-- 右：ビューアエリア -->
  <main id="main">
    <div id="viewer-controls">
      <!-- ページ操作（左端） -->
      <button class="btn icon-only" id="btn-prev" title="前のページ" disabled>
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span id="page-indicator" style="font-size:13px;color:var(--text-muted);white-space:nowrap;min-width:60px;text-align:center;"></span>
      <button class="btn icon-only" id="btn-next" title="次のページ" disabled>
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>

      <div class="ctrl-sep"></div>

      <!-- ズーム -->
      <button class="btn icon-only" id="btn-zoom-out" title="縮小">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      </button>
      <button class="btn icon-only" id="btn-zoom-in" title="拡大">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      </button>
      <button class="btn icon-only" id="btn-fit" title="幅に合わせる">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/></svg>
      </button>

      <div class="ctrl-sep"></div>

      <!-- サムネイル -->
      <button class="btn icon-only" id="btn-thumbs" title="サムネイル">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      </button>
    </div>

    <div id="viewer-wrap">
      <div id="pdf-scroll">
        <canvas id="pdf-canvas"></canvas>
      </div>
      <iframe id="iframe-viewer" allowfullscreen></iframe>
      <div id="pointer-layer"><div id="pointer-dot"></div></div>
      <div id="thumb-panel"></div>
      <div id="empty-state">
        <div style="font-size:48px">📂</div>
        <div>左のリストからファイルを選んでください</div>
      </div>
      <div id="loading"><div class="spinner"></div><span>読み込み中…</span></div>
    </div>
  </main>
</div>

<!-- セッションダイアログ -->
<div id="session-dialog">
  <div id="session-inner">
    <h3>同期セッション</h3>
    <p>同じ部屋コードを入力した端末と<br>ファイル・ページ・ポインターが同期されます</p>
    <input id="session-input" type="text" maxlength="12"
           placeholder="例: ROOM-A" autocomplete="off" autocapitalize="characters">
    <div class="row">
      <button class="btn success" id="btn-session-pres">🎤 発表者として参加</button>
      <button class="btn"         id="btn-session-view">👁 視聴者として参加</button>
    </div>
    <button class="btn" id="btn-session-cancel" style="justify-content:center">キャンセル</button>
  </div>
</div>

<div id="toast"></div>

<script src="config.js"></script>
<script src="auth.js"></script>
<script src="app.js"></script>
</body>
</html>
