<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>会議システム</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
</head>
<body>

<!-- ログイン画面 -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-icon">📋</div>
    <h1 id="login-title">会議システム</h1>
    <div class="form-group">
      <label>ユーザーID</label>
      <input type="text" id="login-id" placeholder="IDを入力"
             autocapitalize="none" autocorrect="off" spellcheck="false">
    </div>
    <div class="form-group">
      <label>パスワード</label>
      <input type="password" id="login-pass" placeholder="パスワードを入力">
    </div>
    <div id="login-error"></div>
    <button class="btn primary login-btn" id="btn-login">ログイン</button>
    <a href="admin.html" class="admin-link">⚙ 管理画面</a>
  </div>
</div>

<!-- ヘッダー -->
<header id="header" style="display:none">
  <span id="app-title-bar">会議システム</span>
  <span id="current-file-name"></span>
  <div style="margin-left:auto; display:flex; gap:8px; align-items:center;">
    <button class="btn" id="btn-presenter">🎤 発表者</button>
    <button class="btn" id="btn-viewer">👁 視聴</button>
    <button class="btn" id="btn-projector">📽 出力</button>
    <button class="btn" id="btn-logout">⏏ 退出</button>
  </div>
</header>

<div class="badge" id="badge-presenter">● 発表者</div>
<div class="badge" id="badge-viewer">● 視聴中</div>
<div class="badge" id="badge-projector">● 出力中</div>

<!-- メインレイアウト -->
<div id="layout" style="display:none">

  <!-- 左：ファイルツリー（縦スクロール） -->
  <aside id="sidebar">
    <div id="sidebar-header">
      <span class="label">資料一覧</span>
      <button class="btn icon-only" id="btn-refresh" title="更新">↺</button>
    </div>
    <div id="file-tree"></div>
  </aside>

  <div id="sidebar-tab">◀</div>

  <!-- 右：ビューアエリア -->
  <main id="main">

    <!-- コントロールバー -->
    <div id="viewer-controls">
      <!-- サイドバー開閉 -->
      <button class="btn icon-only" id="btn-sidebar-toggle" title="サイドバーを表示/隠す">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <line x1="9" y1="3" x2="9" y2="21"/>
        </svg>
      </button>

      <div class="ctrl-sep"></div>

      <button class="btn icon-only" id="btn-thumbs" title="ファイル一覧">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
      </button>
      <span id="page-indicator"></span>
    </div>

    <!-- ビューア本体 -->
    <div id="viewer-wrap">
      <!-- Google Drive iframeビューア -->
      <iframe id="iframe-viewer" allowfullscreen></iframe>

      <!-- ポインターレイヤー -->
      <div id="pointer-layer"><div id="pointer-dot"></div></div>

      <!-- サムネイルパネル（下から） -->
      <div id="thumb-panel"></div>

      <!-- 空状態 -->
      <div id="empty-state">
        <div style="font-size:48px">📂</div>
        <div>左のリストからファイルを選んでください</div>
      </div>

      <!-- ローディング -->
      <div id="loading"><div class="spinner"></div><span>読み込み中…</span></div>
    </div>
  </main>
</div>

<!-- セッションダイアログ -->
<div id="session-dialog">
  <div id="session-inner">
    <h3>同期セッション</h3>
    <p>同じ部屋コードを入力した端末と<br>ファイル・ページ・ポインターが同期されます</p>
    <input id="session-input" type="text" maxlength="12"
           placeholder="例: ROOM-A" autocomplete="off" autocapitalize="characters">
    <div class="row">
      <button class="btn success" id="btn-session-pres">🎤 発表者として参加</button>
      <button class="btn"         id="btn-session-view">👁 視聴者として参加</button>
    </div>
    <button class="btn" id="btn-session-cancel" style="justify-content:center">キャンセル</button>
  </div>
</div>

<div id="toast"></div>

<script src="config.js"></script>
<script src="auth.js"></script>
<script src="app.js"></script>
</body>
</html>
